name: Build

on:
  push:
    branches: [main]
    tags-ignore: ['**']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer needs tag history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build src/ClaudeTray/ClaudeTray.csproj -c Release

  gnome-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate and pack
        run: |
          for f in gnome-extension/extension.js gnome-extension/prefs.js; do
            cp "$f" /tmp/check.mjs && node --check /tmp/check.mjs
          done
          bash tools/pack-gnome.sh
